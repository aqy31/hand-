<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع اليد: رسم وثلاثي الأبعاد</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Three.js dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div class="container">
        <!-- Hidden video element for webcam -->
        <video id="webcam" class="default-hidden-video" autoplay playsinline muted></video>
        
        <!-- Home Screen -->
        <div id="home_screen" class="screen active">
            <div class="glass-panel text-center">
                <h1>مرحباً بك!</h1>
                <p>اختر الوضع الذي ترغب بتجربته باستخدام كاميرا الويب وتتبع اليد</p>
                <div class="btn-group mt-4">
                    <button id="btn_drawing" class="btn btn-large">🎨 وضع الرسم</button>
                    <button id="btn_3d" class="btn btn-large">🧊 وضع 3D</button>
                    <button id="btn_ar" class="btn btn-large">🌐 وضع الواقع المعزز (AR)</button>
                </div>
                <div id="status_home" class="status-indicator mt-4" style="display:none;"></div>
            </div>
        </div>

        <!-- Drawing Mode -->
        <div id="drawing_mode" class="screen">
            <!-- Canvas to display the drawing -->
            <canvas id="output_canvas"></canvas>

            <!-- Cursor for index finger -->
            <div id="cursor" style="position: absolute; width: 20px; height: 20px; border: 2px solid #00ffcc; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); display: none; z-index: 5;"></div>

            <!-- Glassmorphism control panel -->
            <div class="controls panel-glass">
                <h2>لوحة التحكم</h2>
                <div class="control-group">
                    <label for="colorPicker">لون الرسم:</label>
                    <input type="color" id="colorPicker" value="#00ffcc">
                </div>
                <div class="control-group">
                    <label for="lineWidth">حجم الخط:</label>
                    <input type="range" id="lineWidth" min="1" max="20" value="5">
                </div>
                <button id="clearBtn" class="btn">مسح الشاشة</button>
                <button id="back_from_drawing" class="btn btn-secondary mt-2">العودة للرئيسية</button>
                <div id="status_drawing" class="status-indicator loading">جاري تحميل الكاميرا...</div>
            </div>
        </div>

        <!-- 3D Mode -->
        <div id="3d_mode" class="screen">
            <div class="controls panel-glass">
                <h2>تحكم 3D</h2>
                <p style="font-size: 0.9rem; margin-bottom: 10px;">حرّك راحة يدك لتحريك المجسم. قم بضم يدك بشكل قبضة لإخفائه مؤقتاً.</p>
                <button id="back_from_3d" class="btn btn-secondary">العودة للرئيسية</button>
                <div id="status_3d" class="status-indicator loading">جاري تحميل الكاميرا...</div>
            </div>
        </div>

        <!-- AR Mode -->
        <div id="ar_mode" class="screen">
            <div class="controls panel-glass">
                <h2>الواقع المعزز (AR)</h2>
                <p style="font-size: 0.9rem; margin-bottom: 10px;">امسك المجسم بيدك في العالم الحقيقي!</p>
                <button id="switch_camera" class="btn">🔄 تبديل الكاميرا</button>
                <button id="back_from_ar" class="btn btn-secondary mt-2">العودة للرئيسية</button>
                <div id="status_ar" class="status-indicator loading mt-2">جاري تحميل الكاميرا...</div>
            </div>
        </div>
        
        <!-- Shared Container for Three.js Canvas -->
        <div id="threejs_container"></div>
    </div>

    <!-- Main Logic -->
    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرسم باستخدام حركة الإصبع</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- Hidden video element for webcam -->
        <video id="webcam" autoplay playsinline style="position: absolute; width: 0; height: 0; visibility: hidden;"></video>
        
        <!-- Canvas to display the drawing -->
        <canvas id="output_canvas"></canvas>

        <!-- Cursor for index finger -->
        <div id="cursor" style="position: absolute; width: 20px; height: 20px; border: 2px solid #00ffcc; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); display: none; z-index: 5;"></div>

        <!-- Glassmorphism control panel -->
        <div class="controls panel-glass">
            <h2>لوحة التحكم</h2>
            <div class="control-group">
                <label for="colorPicker">لون الرسم:</label>
                <input type="color" id="colorPicker" value="#00ffcc">
            </div>
            <div class="control-group">
                <label for="lineWidth">حجم الخط:</label>
                <input type="range" id="lineWidth" min="1" max="20" value="5">
            </div>
            <button id="clearBtn" class="btn">مسح الشاشة</button>
            <div id="status" class="status-indicator loading">جاري تحميل الكاميرا ومكتبة الذكاء الاصطناعي...</div>
        </div>
    </div>

    <!-- Main Logic -->
    <script type="module" src="script.js"></script>
</body>
</html>
